version: 0.1
globalTimeout: 180
testSuiteTimeout: 180
testSuiteStep: 180

runson: linux

autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 5

# BROWSERS drives pytest parametrize in conftest.py.
# Each test runs once per browser → 4x coverage per scenario.
env:
  LT_USERNAME:        ${LT_USERNAME}
  LT_ACCESS_KEY:      ${LT_ACCESS_KEY}
  GITHUB_RUN_NUMBER:  ${GITHUB_RUN_NUMBER}
  TARGET_URL:         "https://ecommerce-playground.lambdatest.io/"
  BROWSERS:           "chrome,firefox"

cacheKey: '{{ checksum "requirements-he.txt" }}'
cacheDirectories:
  - .pip_cache
  - ~/.cache/ms-playwright

pre:
  - mkdir -p reports
  - python3 -m venv .venv || python -m venv .venv
  - .venv/bin/pip install --cache-dir .pip_cache -r requirements-he.txt
  - .venv/bin/python -c "from playwright.sync_api import sync_playwright; print('[pre] playwright OK')"
  - .venv/bin/python -m playwright install chromium firefox
  - .venv/bin/python ci/generate_he_tests.py

runtime:
  language: python
  version: "3.11"

testDiscovery:
  type: raw
  mode: dynamic
  command: PYTHONPATH=. .venv/bin/pytest tests/playwright/test_scenarios.py --collect-only -q --no-header 2>/dev/null | grep "::"

testRunnerCommand: >
  PYTHONPATH=. .venv/bin/pytest "$test" -v --tb=short -s
  --html=reports/report.html
  --junitxml=reports/junit.xml

mergeArtifacts: true
uploadArtefacts:
  - name: TestReports
    path:
      - reports/

report: true
partialReports:
  type: json
  location: reports/
  frameworkName: extent

post:
  - echo "HyperExecute Agentic SDLC run complete"

jobLabel:
  - agentic-sdlc
  - lambdatest-pitch
  - playwright
  - multi-browser
