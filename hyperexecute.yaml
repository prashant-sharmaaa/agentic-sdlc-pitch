---
version: "0.1"
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

runson: linux

autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 5

env:
  TARGET_OS: "LINUX"
  BUILD: "Agentic SDLC | KaneAI Export"

cacheKey: '{{ checksum "requirement.txt" }}'
cacheDirectories:
  - CacheDir

pre:
  - pip3 install -r requirement.txt --cache-dir CacheDir
  - playwright install

testDiscovery:
  type: raw
  mode: dynamic
  command: python3 ci/list_tests.py

testRunnerCommand: python $test

mergeArtifacts: true
uploadArtefacts:
  - name: TestReports
    path:
      - reports/

report: true
partialReports:
  type: json
  location: reports/
  frameworkName: extent

post:
  - echo "HyperExecute Agentic SDLC — Kane Python export run complete"

jobLabel:
  - agentic-sdlc
  - lambdatest-pitch
  - kaneai
  - python
  - playwright
