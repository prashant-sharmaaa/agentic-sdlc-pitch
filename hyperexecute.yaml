version: 0.1
globalTimeout: 180
testSuiteTimeout: 180
testSuiteStep: 180

runson: linux

autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 5

# BROWSERS drives pytest parametrize in conftest.py.
# Each test runs once per browser → 4x coverage per scenario.
env:
  LT_USERNAME:        ${LT_USERNAME}
  LT_ACCESS_KEY:      ${LT_ACCESS_KEY}
  GITHUB_RUN_NUMBER:  ${GITHUB_RUN_NUMBER}
  TARGET_URL:         "https://ecommerce-playground.lambdatest.io/"
  BROWSERS:           "chrome,firefox"

cacheKey: '{{ checksum "requirements-he.txt" }}'
cacheDirectories:
  - .pip_cache

pre:
  - mkdir -p reports
  - pip3 install --cache-dir .pip_cache -r requirements-he.txt
  - python3 -c "from playwright.sync_api import sync_playwright; print('[pre] playwright OK')"
  - python3 ci/generate_he_tests.py

testDiscovery:
  type: raw
  mode: dynamic
  command: python3 ci/list_tests.py

testRunnerCommand: >
  PYTHONPATH=. python3 -m pytest "$test" -v --tb=short -s
  -p no:playwright
  --html=reports/report.html
  --junitxml=reports/junit.xml

mergeArtifacts: true
uploadArtefacts:
  - name: TestReports
    path:
      - reports/

report: true
partialReports:
  type: json
  location: reports/
  frameworkName: extent

post:
  - echo "HyperExecute Agentic SDLC run complete"

jobLabel:
  - agentic-sdlc
  - lambdatest-pitch
  - playwright
  - multi-browser
