name: "Agentic SDLC"

# ─────────────────────────────────────────────────────────────────────────────
# Agentic SDLC: Requirements → Claude ACs → Claude Objectives → KaneAI (kane-cli)
#               → LambdaTest Test Manager (test cases via API) → HyperExecute
#               → AI RCA → Traceability
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    # [skip ci] in commit message prevents infinite loop from auto-improve commits
  workflow_dispatch:
    inputs:
      requirements_url:
        description: "URL to requirements doc (Google Doc export, Notion, Dropbox, raw URL). Leave blank to use existing requirements/ files."
        required: false
        type: string
      from_step:
        description: "Start from step (1=analyze reqs, 2=gen objectives, 3=flow2 pipeline)"
        required: false
        default: "3"
        type: choice
        options: ["1", "2", "3"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  flow2-pipeline:
    name: "Agentic SDLC · KaneAI → Test Manager → HyperExecute"
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for auto-improve git commit + push

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r requirements.txt --cache-dir ~/.cache/pip -q

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install kane-cli
        run: npm install -g @testmuai/kane-cli@latest

      - name: Configure kane-cli
        env:
          LT_USERNAME:   ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          kane-cli login --username "$LT_USERNAME" --access-key "$LT_ACCESS_KEY"
          kane-cli install skill
          kane-cli config project 01KVXJ82AKT83GWJNFZTQVMNRQ
          kane-cli config folder  ${{ secrets.KANE_FOLDER_ID }}
          kane-cli whoami

      - name: Ensure output directories
        run: mkdir -p reports logs requirements

      - name: Restore run history from last flow2 artifact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --workflow=flow2.yml --branch=main --status=success --limit=1 --json databaseId -q '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$RUN_ID" ]; then
            echo "Restoring run_history.json from run $RUN_ID"
            gh run download "$RUN_ID" --name "flow2-results-*" --dir /tmp/prev-artifacts 2>/dev/null || true
            HIST=$(find /tmp/prev-artifacts -name "run_history.json" | head -1)
            [ -n "$HIST" ] && cp "$HIST" ci/run_history.json && echo "Restored run_history.json"
            REQS=$(find /tmp/prev-artifacts -name "analyzed_requirements.json" | head -1)
            [ -n "$REQS" ] && cp "$REQS" requirements/analyzed_requirements.json && echo "Restored analyzed_requirements.json"
            RHASH=$(find /tmp/prev-artifacts -name ".requirements_hash" | head -1)
            [ -n "$RHASH" ] && cp "$RHASH" requirements/.requirements_hash && echo "Restored .requirements_hash"
            OHASH=$(find /tmp/prev-artifacts -name ".objectives_hash" | head -1)
            [ -n "$OHASH" ] && cp "$OHASH" ci/.objectives_hash && echo "Restored .objectives_hash"
            if [ -z "$HIST" ]; then echo "No previous artifact found — starting fresh"; fi
          else
            echo "No previous successful flow2 run found — starting fresh"
          fi

      - name: "Download requirements doc from URL (if provided)"
        if: ${{ inputs.requirements_url != '' }}
        run: |
          # Clear previous requirements docs so new app reqs don't mix with old ones
          find requirements/ -maxdepth 1 \( -name "*.txt" -o -name "*.md" \) -delete
          echo "Cleared old requirements files"

          URL="${{ inputs.requirements_url }}"
          echo "Input URL: $URL"

          # ── Google Docs (docs.google.com/document/d/<ID>) ─────────────────
          if echo "$URL" | grep -q "docs.google.com/document"; then
            DOC_ID=$(echo "$URL" | grep -oP '(?<=/d/)[^/?]+')
            URL="https://docs.google.com/document/d/${DOC_ID}/export?format=txt"
            echo "→ Google Docs export URL"

          # ── Google Drive FOLDER (not supported — need a file link) ───────
          elif echo "$URL" | grep -qE "drive\.google\.com.*(folders|drive/u)"; then
            echo "ERROR: You provided a Google Drive FOLDER link."
            echo "Please share a specific FILE instead:"
            echo "  1. Open the file in Google Drive"
            echo "  2. Right-click → Share → 'Anyone with the link'"
            echo "  3. Copy the file link (contains /file/d/ or docs.google.com/document/d/)"
            exit 1

          # ── Google Drive file (drive.google.com/file/d/<ID>) ──────────────
          elif echo "$URL" | grep -q "drive.google.com"; then
            FILE_ID=$(echo "$URL" | grep -oP '(?<=/d/)[^/?]+')
            if [ -z "$FILE_ID" ]; then
              echo "ERROR: Could not extract file ID from Google Drive URL: $URL"
              echo "Expected format: https://drive.google.com/file/d/FILE_ID/view"
              exit 1
            fi
            # Use export download — handles large files by bypassing virus-scan warning
            URL="https://drive.google.com/uc?export=download&id=${FILE_ID}&confirm=t"
            echo "→ Google Drive direct download"

          # ── GitHub blob URL (github.com/.../blob/...) ─────────────────────
          elif echo "$URL" | grep -qP "github\.com/.+/blob/"; then
            URL=$(echo "$URL"               | sed 's|github\.com|raw.githubusercontent.com|'               | sed 's|/blob/|/|')
            echo "→ GitHub raw URL"

          # ── GitHub Gist ───────────────────────────────────────────────────
          elif echo "$URL" | grep -q "gist.github.com"; then
            GIST_ID=$(echo "$URL" | grep -oP '[a-f0-9]{20,}')
            URL="https://gist.githubusercontent.com/raw/${GIST_ID}"
            echo "→ GitHub Gist raw"

          # ── Dropbox ───────────────────────────────────────────────────────
          elif echo "$URL" | grep -q "dropbox.com"; then
            URL=$(echo "$URL" | sed 's/[?&]dl=0/\&dl=1/g')
            URL="${URL}&dl=1"
            URL=$(echo "$URL" | sed 's/&&/\&/g')
            echo "→ Dropbox direct download"

          else
            echo "→ Raw URL (using as-is)"
          fi

          echo "Resolved URL: $URL"
          FILENAME="requirements/uploaded_$(date +%Y%m%d_%H%M%S).txt"

          HTTP_CODE=$(curl -fsSL "$URL" -o "$FILENAME" -w "%{http_code}" 2>&1) || true
          if [ ! -s "$FILENAME" ]; then
            echo "ERROR: Download failed or file is empty (HTTP $HTTP_CODE)"
            echo "Make sure the document is publicly shared (Anyone with the link can view)"
            exit 1
          fi

          BYTES=$(wc -c < "$FILENAME")
          echo "Saved to $FILENAME ($BYTES bytes)"
          if [ "$BYTES" -lt 50 ]; then
            echo "ERROR: File too small — may be a login redirect page, not the actual document"
            cat "$FILENAME"
            exit 1
          fi
          head -20 "$FILENAME"

      - name: "Step 1 — Analyze requirements (Claude)"
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.from_step == '' || inputs.from_step <= '1') }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 -u ci/analyze_requirements.py

      - name: "Step 2 — Generate kane-cli objectives (Claude)"
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.requirements_url != '' && (inputs.from_step == '' || inputs.from_step <= '2') }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 -u ci/generate_objectives.py

      - name: "Step 3 — Flow 2 pipeline (KaneAI → TM API → HyperExecute)"
        env:
          LT_USERNAME:       ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY:     ${{ secrets.LT_ACCESS_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: python3 -u ci/flow2_pipeline.py

      - name: Write GitHub Step Summary
        if: always()
        run: |
          {
            echo "## Agentic SDLC — Results"
            echo ""
            if [ -f reports/traceability_matrix.md ]; then
              cat reports/traceability_matrix.md
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow2-results-${{ github.run_number }}
          path: |
            reports/
            ci/objectives.json
            ci/run_history.json
            ci/he_jobs.json
            ci/rca_results.json
            ci/tm_test_cases.json
            logs/
            requirements/analyzed_requirements.json
            requirements/.requirements_hash
            ci/.objectives_hash
          retention-days: 30
