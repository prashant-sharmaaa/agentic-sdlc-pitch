name: "Agentic SDLC — Demo"

# ─────────────────────────────────────────────────────────────────────────────
# Instantly shows Flow 2 results from the last real pipeline run.
# No kane-cli, no HyperExecute — reads cached results and displays the
# traceability matrix + TM test case IDs + HE job links in Step Summary.
#
# Triggers:
#   - Automatically after Flow 2 pipeline completes
#   - Manually via workflow_dispatch (for pitch demos)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Flow 2 run ID to pull results from (leave blank for latest successful run)"
        required: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  demo:
    name: "Flow 2 · Demo — Live Traceability Matrix"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: pip install anthropic -q

      - name: Ensure reports directory
        run: mkdir -p reports

      - name: Download Flow 2 results (latest successful run or specified run_id)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(gh run list \
              --workflow flow2.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
            echo "Latest Flow 2 run: $RUN_ID"
          fi
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --dir . --pattern "flow2-results-*" || true
            find . -name "demo_cache.json" -not -path "./reports/*" \
              -exec cp {} reports/demo_cache.json \; 2>/dev/null || true
            find . -name "traceability_matrix.md" -not -path "./reports/*" \
              -exec cp {} reports/traceability_matrix.md \; 2>/dev/null || true
            find . -name "tm_test_cases.json" -not -path "./ci/*" \
              -exec cp {} ci/tm_test_cases.json \; 2>/dev/null || true
          fi

      - name: Show traceability matrix
        run: python3 ci/demo.py

      - name: Write GitHub Step Summary
        if: always()
        run: |
          {
            echo "## Flow 2 — Live Traceability Matrix"
            echo ""
            echo "\`\`\`"
            python3 ci/demo.py 2>/dev/null || echo "No cached results found. Run Flow 2 first."
            echo "\`\`\`"
            echo ""
            if [ -f reports/traceability_matrix.md ]; then
              cat reports/traceability_matrix.md
            fi
          } >> $GITHUB_STEP_SUMMARY
